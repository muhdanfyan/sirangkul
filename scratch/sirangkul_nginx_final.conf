server {
    server_name sirangkul.man2kotamakassar.sch.id;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self';";
    
    # Frontend
    location / {
        root /home/sirangkul/apps/sirangkul/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API - High Precision Routing WITH Robust Alias Fix
    location /api {
        alias /home/sirangkul/apps/sirangkul/api-sirangkul/public;
        index index.php;
        
        # Try finding the file in the alias path first, fallback to @larapi
        try_files $uri $uri/ @larapi;

        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
            # Explicitly use request_filename which Nginx calculates from alias
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
        }
    }

    # Robust Laravel Fallback for /api prefix
    location @larapi {
        rewrite ^/api/(.*)$ /api/index.php?/$1 last;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sirangkul.man2kotamakassar.sch.id/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sirangkul.man2kotamakassar.sch.id/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = sirangkul.man2kotamakassar.sch.id) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name sirangkul.man2kotamakassar.sch.id;
    return 404; # managed by Certbot
}
